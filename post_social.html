<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
   <style>
       body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.container {
    width: 50%;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    margin-top: 20px;
}

h1 {
    text-align: center;
}

#postContainer {
    margin-top: 20px;
}

.post {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

.post-header {
    display: flex;
    align-items: center;
    font-size: 14px;
    color: #333;
    font-weight: bold;
}

.post-header i {
    font-size: 24px;
    margin-right: 10px;
}

.post-text {
    font-size: 16px;
    margin: 10px 0;
}

.post-footer {
    font-size: 12px;
    color: gray;
}

/* Floating Create Post Button */
.create-post-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    border: none;
    font-size: 18px;
    color: white;
    cursor: pointer;
    padding: 15px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease-in-out;
    box-shadow: 0 4px 10px rgba(255, 65, 108, 0.5);
}

.create-post-btn:hover {
    background: linear-gradient(45deg, #ff512f, #dd2476);
    transform: scale(1.1);
}

/* Post Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 40%;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
    text-align: center;
}

.modal-content textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.modal-actions {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
}

.save-btn, .cancel-btn {
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: white;
    border-radius: 5px;
}

.save-btn {
    background: #28a745;
}

.cancel-btn {
    background: #dc3545;
}
   </style>
</head>
<body>

    <div class="container">
        <h1>Posts</h1>
        <div id="postContainer"></div>
    </div>

    <!-- Floating Create Post Button -->
    <button class="create-post-btn" onclick="openPostDialog()">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Post Creation Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <h2>Create Post</h2>
            <textarea id="postText" placeholder="What's on your mind?"></textarea>
            <div class="modal-actions">
                <button class="save-btn" onclick="savePost()"><i class="fas fa-check"></i> Save</button>
                <button class="cancel-btn" onclick="closePostDialog()"><i class="fas fa-times"></i> Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcTEVvxXmv5N8dJav4xNDRy5hXZRjVeM4",
            authDomain: "chatflow-59776.firebaseapp.com",
            databaseURL: "https://chatflow-59776-default-rtdb.firebaseio.com",
            projectId: "chatflow-59776",
            storageBucket: "chatflow-59776.appspot.com",
            messagingSenderId: "549003131640",
            appId: "1:549003131640:web:3f4a7b8cef4c0d8a2b990d",
            measurementId: "G-V2180PR5CR"
        };

        firebase.initializeApp(firebaseConfig);
        const firestore = firebase.firestore();
        const auth = firebase.auth();
        const postContainer = document.getElementById('postContainer');

        function fetchAndDisplayName(email, callback) {
        const namesRef = firestore.collection("names");
        namesRef.where("email", "==", email).get().then((snapshot) => {
            let lastTimestamp = 0;
            let latestName = "Unknown User"; // Default name

            snapshot.forEach((doc) => {
                const timestamp = doc.get("timestamp") || 0;
                const name = doc.get("name");

                if (timestamp > lastTimestamp && name) {
                    lastTimestamp = timestamp;
                    latestName = name;
                }
            });

            callback(latestName);
        }).catch(error => {
            console.error("Error fetching name:", error);
            callback("Unknown User");
        });
    }

    function fetchProfilePhoto(userEmail, callback) {
        const profilesPhotoRef = firestore.collection("profilesphoto");
        profilesPhotoRef.where("uploaderEmail", "==", userEmail)
            .get()
            .then((querySnapshot) => {
                let latestPhotoUrl = "user_1077114.png"; // Default profile photo
                let latestTimestamp = 0;

                querySnapshot.forEach((doc) => {
                    const timestamp = doc.data().timestamp || 0;
                    const photoUrl = doc.data().downloadUrl;

                    if (timestamp > latestTimestamp) {
                        latestTimestamp = timestamp;
                        latestPhotoUrl = photoUrl;
                    }
                });

                callback(latestPhotoUrl);
            })
            .catch((error) => {
                console.error("Error fetching profile photo:", error);
                callback("user_1077114.png"); // Fallback to default
            });
    }

    function fetchPosts() {
    firestore.collection("postforall").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        postContainer.innerHTML = "";
        snapshot.forEach(doc => {
            let post = doc.data();
            let postElement = document.createElement("div");
            postElement.classList.add("post");

            fetchAndDisplayName(post.poster, (displayName) => {
                fetchProfilePhoto(post.poster, (profilePhotoUrl) => {
                    checkVerifiedOrNot(post.poster, (isVerified) => {
                        postElement.innerHTML = `
                            <div class="post-header" style="display: flex; align-items: center;">
                                <img src="${profilePhotoUrl}" alt="Profile Photo" 
                                    style="width: 30px; height: 30px; border-radius: 50%; margin-right: 10px;">
                                <span>${displayName}</span>
                                <img src="verification.jpg" alt="Verified" class="verified-icon" 
                                    style="width: 16px; height: 16px; margin-left: 5px; display: ${isVerified ? 'inline' : 'none'};">
                            </div>
                            <div class="post-text">${post.posttext}</div>
                            <div class="post-footer">${new Date(post.timestamp).toLocaleString()}</div>
                        `;
                        postContainer.appendChild(postElement);
                    });
                });
            });
        });
    });
}

function checkVerifiedOrNot(userEmail, callback) {
    const verificationRef = firestore.collection("verificationbridge");

    verificationRef.where("email", "==", userEmail)
        .get()
        .then((snapshot) => {
            callback(!snapshot.empty); // Returns true if verified, false otherwise
        })
        .catch((error) => {
            console.error("Error checking verification status:", error);
            callback(false);
        });
}



        function openPostDialog() {
            document.getElementById('postModal').style.display = 'flex';
        }

        function closePostDialog() {
            document.getElementById('postModal').style.display = 'none';
            document.getElementById('postText').value = '';
        }

        function savePost() {
            const user = firebase.auth().currentUser;
            if (user) {
                const postText = document.getElementById('postText').value.trim();
                if (postText !== "") {
                    firestore.collection("postforall").add({
                        poster: user.email,
                        posttext: postText,
                        timestamp: Date.now()
                    }).then(() => {
                        closePostDialog();
                    }).catch(error => {
                        console.error("Error adding post: ", error);
                    });
                }
            } else {
                alert("Please log in to create a post.");
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                fetchPosts();
            } else {
                alert("You must be logged in to view posts.");
            }
        });
    </script>

</body>
</html>
