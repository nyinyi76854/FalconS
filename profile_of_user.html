<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-header h2 {
            font-size: 24px;
            color: #333;
        }
        .user-email {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h2>User Profile</h2>
            <p class="user-email">Loading user email...</p>
        </div>
        <div class="profile-content">
            <!-- Profile information will be displayed here -->
        </div>
    </div>

    <script>
        // Extract userEmail from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const userEmail = urlParams.get('userEmail');

        // Display the user email
        if (userEmail) {
            document.querySelector('.user-email').textContent = `User Email: ${userEmail}`;
        } else {
            document.querySelector('.user-email').textContent = 'No user email found.';
        }

        // You can add more functionality here to fetch and display user data (name, photo, etc.)
    </script>
</body>
</html>
