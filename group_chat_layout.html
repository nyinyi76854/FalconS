<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <link rel="icon" type="image/x-icon" href="FalconS.ico">
    <style>
/* General reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
    flex-direction: column; /* Center everything vertically */
}

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background-color: #007bff;
    color: white;
    width: 100%;
    max-width: 500px; /* Limit max width for header */
    margin-bottom: 10px; /* Add space below header */
}

.header i {
    font-size: 24px;
    cursor: pointer;
}

#groupProfilePhoto {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    margin-left: 15px;
}

#groupName {
    font-size: 18px;
    font-weight: bold;
    flex-grow: 1;
    margin-left: 10px;
}

#viewMembersButton {
    position: static;
    font-size: 24px;
}

.chat-container {
    width: 100%;
    max-width: 500px; /* Limit max width for chat container */
    height: 400px;
    padding: 20px;
    overflow-y: scroll;
    background-color: #ffffff;
    border-top: 1px solid #ddd;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    margin-bottom: 10px; /* Add space below chat container */
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* Align messages from left by default */
}

/* Message bubbles */
.message {
    margin-bottom: 15px;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 70%;
    word-wrap: break-word;
    display: inline-block;
    position: relative;
    clear: both; /* Ensure clear for both left and right messages */
}

/* Sent messages */
.message.sent {
    background-color: #007bff;
    color: white;
    margin-left: auto; /* Align to the right */
    margin-right: 0; /* Make sure there is no margin on the right */
    border-top-left-radius: 20px;
    border-top-right-radius: 0;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 20px;
    text-align: right; /* Ensure text inside bubble aligns to the right */
}

/* Received messages */
.message.received {
    background-color: #f0f0f0;
    color: #333;
    margin-right: auto; /* Align to the left */
    margin-left: 0; /* Make sure there is no margin on the left */
    border-top-left-radius: 0;
    border-top-right-radius: 20px;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 0;
    text-align: left; /* Ensure text inside bubble aligns to the left */
}
/* Input container */
.input-container {
    display: flex;
    align-items: center;
    padding: 15px;
    background-color: #ffffff;
    border-top: 1px solid #ddd;
    width: 100%;
    max-width: 500px; /* Limit max width for input container */
}

#messageInput {
    width: 100%;
    padding: 10px;
    margin-right: 10px;
    border-radius: 20px;
    border: 1px solid #ddd;
    font-size: 16px;
}

#folderButton,
#sendButton {
    font-size: 24px;
    background-color: transparent;
    border: none;
    color: #007bff;
    cursor: pointer;
    margin-left: 10px;
}

/* Additional responsiveness */
@media (max-width: 768px) {
    .header {
        flex-direction: column;
        align-items: flex-start;
    }

    #groupName {
        font-size: 16px;
        margin-left: 0;
    }

    #viewMembersButton {
        margin-top: 10px;
    }

    .chat-container {
        width: 100%;
        max-width: 100%;
    }
}

</style>

<!-- Add Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<body>
    <div class="header">
        <i class="fas fa-arrow-left" id="backButton"></i>
        <img id="groupProfilePhoto" src="group.jpg" alt="Group Profile">
        <h2 id="groupName">Group Name</h2>
        <i class="fas fa-users" id="viewMembersButton" style="cursor: pointer;"></i>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message">
        <button id="folderButton" class="fas fa-folder-open"></button>
        <button id="sendButton" class="fas fa-paper-plane"></button>
    </div>
</body>



    <!-- Firebase JS SDKs -->
  <!-- Firebase JS SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcTEVvxXmv5N8dJav4xNDRy5hXZRjVeM4",
        authDomain: "chatflow-59776.firebaseapp.com",
        databaseURL: "https://chatflow-59776-default-rtdb.firebaseio.com",
        projectId: "chatflow-59776",
        storageBucket: "chatflow-59776.appspot.com",
        messagingSenderId: "549003131640",
        appId: "1:549003131640:web:3f4a7b8cef4c0d8a2b990d",
        measurementId: "G-V2180PR5CR"
    };

    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();
    const storage = firebase.storage();

    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('groupId');
    const groupName = urlParams.get('groupName');

    // Set group name in UI
    document.getElementById('groupName').textContent = groupName;

    // Back button event
    document.getElementById('backButton').addEventListener('click', () => {
        window.location.href = 'maininterface.html';
    });

    // View members button
    document.getElementById('viewMembersButton').addEventListener('click', () => {
        window.location.href = `view_members.html?groupId=${groupId}&groupName=${groupName}`;
    });

    // Explore Host button
    document.getElementById("exploreHostBtn").addEventListener("click", () => {
        window.location.href = "host.html";
    });

    // Load group profile photo
    function loadGroupProfilePhoto(groupId) {
        firestore.collection("groupprofile")
            .where("groupId", "==", groupId)
            .get()
            .then(snapshot => {
                let latestPhotoUrl = "group.jpg"; // Default group image
                let latestTimestamp = 0;

                snapshot.forEach(doc => {
                    const { timestamp, photoUrl } = doc.data();
                    if (timestamp > latestTimestamp) {
                        latestTimestamp = timestamp;
                        latestPhotoUrl = photoUrl;
                    }
                });

                document.getElementById("groupProfilePhoto").src = latestPhotoUrl;
            })
            .catch(error => console.error("Error fetching group profile photo:", error.message));
    }

    loadGroupProfilePhoto(groupId);

    // Redirect to group profile upload
    document.getElementById("groupProfilePhoto").addEventListener("click", () => {
        if (groupId && groupName) {
            window.location.href = `upload_group_profile.html?groupId=${encodeURIComponent(groupId)}&groupName=${encodeURIComponent(groupName)}`;
        } else {
            alert("Group ID is missing!");
        }
    });

    // Message Input and File Upload Handling
    const folderButton = document.getElementById('folderButton');
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const fileInput = document.createElement('input');

    fileInput.type = 'file';
    fileInput.accept = 'image/*, video/*';

    folderButton.style.display = 'block';
    sendButton.style.display = 'none';

    // Show send button when typing, hide when input is empty
    messageInput.addEventListener('input', () => {
        const hasText = messageInput.value.trim() !== "";
        sendButton.style.display = hasText ? 'block' : 'none';
        folderButton.style.display = hasText ? 'none' : 'block';
    });

    folderButton.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const user = firebase.auth().currentUser;
        if (!user) {
            alert("User not authenticated");
            return;
        }

        const filePath = file.type.startsWith('image') ? `groupsentphotos/${file.name}` : `groupsentvideos/${file.name}`;
        const fileRef = storage.ref().child(filePath);

        try {
            const snapshot = await fileRef.put(file);
            const url = await snapshot.ref.getDownloadURL();
            await firestore.collection("groupchat").doc(groupId)
                .collection("groupmessages").add({
                    senderEmail: user.email,
                    text: url,
                    sentTime: Date.now(),
                    isRead: false
                });
            console.log('File uploaded and message sent');
        } catch (error) {
            console.error("Error uploading file:", error.message);
        }
    });

    sendButton.addEventListener("click", async () => {
        const messageText = messageInput.value.trim();
        if (!messageText) return;

        const user = firebase.auth().currentUser;
        if (!user) {
            alert("User not authenticated");
            return;
        }

        try {
            await firestore.collection("groupchat").doc(groupId)
                .collection("groupmessages").add({
                    senderEmail: user.email,
                    text: messageText,
                    sentTime: Date.now(),
                    isRead: false
                });
            messageInput.value = "";
            sendButton.style.display = "none";
            folderButton.style.display = 'block';
        } catch (error) {
            console.error("Error sending message:", error.message);
        }
    });

    function isVideoUrl(text) {
        return text.includes("/groupsentvideos%2F");
    }

    function isImageUrl(text) {
        return text.includes("/groupsentphotos%2F");
    }

    function loadMessages() {
        const chatContainer = document.getElementById("chatContainer");

        firestore.collection("groupchat").doc(groupId)
            .collection("groupmessages")
            .orderBy("sentTime")
            .onSnapshot(snapshot => {
                chatContainer.innerHTML = "";

                snapshot.forEach(doc => {
                    const { senderEmail, text } = doc.data();
                    const isCurrentUser = senderEmail === firebase.auth().currentUser?.email;

                    const messageWrapper = document.createElement("div");
                    messageWrapper.classList.add("message-wrapper");
                    messageWrapper.style.display = "flex";
                    messageWrapper.style.alignItems = "center";

                    if (!isCurrentUser) {
                        const receiverProfileImg = document.createElement("img");
                        receiverProfileImg.src = "user_1077114.png";
                        receiverProfileImg.alt = "Profile Photo";
                        receiverProfileImg.style.width = "40px";
                        receiverProfileImg.style.height = "40px";
                        receiverProfileImg.style.borderRadius = "50%";
                        receiverProfileImg.style.marginRight = "10px";

                        firestore.collection("profilesphoto")
                            .where("uploaderEmail", "==", senderEmail)
                            .get()
                            .then(profileSnapshot => {
                                profileSnapshot.forEach(profileDoc => {
                                    receiverProfileImg.src = profileDoc.data().downloadUrl;
                                });
                            });

                        messageWrapper.appendChild(receiverProfileImg);
                    }

                    const messageDiv = document.createElement("div");
                    messageDiv.classList.add("message", isCurrentUser ? "sent" : "received");

                    if (isImageUrl(text)) {
                        const img = document.createElement("img");
                        img.src = text;
                        img.style.maxWidth = "100%";
                        img.style.maxHeight = "200px";
                        messageDiv.appendChild(img);
                    } else if (isVideoUrl(text)) {
                        const video = document.createElement("video");
                        video.src = text;
                        video.controls = true;
                        video.style.maxWidth = "100%";
                        video.style.maxHeight = "200px";
                        messageDiv.appendChild(video);
                    } else {
                        messageDiv.textContent = text;
                    }

                    messageWrapper.appendChild(messageDiv);
                    chatContainer.appendChild(messageWrapper);
                });

                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
    }

    loadMessages();
</script>


</body>
</html>
